# Stage 1 — SeqCLR contrastive pretraining of the ViT encoder (no labels).
# Only the encoder is trained; the decoder is frozen/unused.
stage: 1
name: seqclr_pretrain

model:
  base: microsoft/trocr-base-printed
  encoder_only: true          # decoder weights not used in this stage

data:
  synthetic_dir: data/synthetic/images
  batch_size: 32
  num_workers: 4

augmentation:
  views_per_sample: 2         # two distorted crops per image for contrastive pairs
  # view pipeline: random crop → resize → colour jitter → blur → noise

optimizer:
  name: adamw
  lr: 1.0e-4
  weight_decay: 0.01
  warmup_steps: 500
  epochs: 20

contrastive:
  loss: seqclr                # SeqCLR operates on per-position encoder tokens
  temperature: 0.07
  projection_dim: 256

output:
  checkpoint_dir: models/stage1
  save_every_n_epochs: 5
  best_metric: val_loss
