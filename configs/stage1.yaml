# Stage 1 — SeqCLR contrastive pretraining of the ViT encoder (no labels).
# Self-supervised: two independently-styled renders of the same paragraph
# (identical horizontal wrapping) form a positive pair; the encoder learns
# frame-level representations via a window-pooled NT-Xent loss.
model:
  base: microsoft/trocr-base-printed
  n_windows: 8
  proj_dim: 128
  proj_hidden: 512
data:
  min_chars: 10
  max_chars: 500
  corpus_fallback: data/texts.json
training:
  batch_size: 64
  learning_rate: 1e-4
  warmup_steps: 1000
  total_steps: 100000
  grad_accumulation: 1
  precision: bf16
  seed: 42
loss:
  temperature: 0.07
checkpointing:
  save_dir: models/stage1
  save_every_n_steps: 5000
  keep_last_n: 3
logging:
  wandb: false
  log_every_n_steps: 100
linear_probe:
  enabled: true
  n_samples: 10000
  epochs: 1
